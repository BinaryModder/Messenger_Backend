version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: messenger_db
    environment:
      POSTGRES_USER: cluster_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: clusterdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cluster_user -d clusterdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - messenger_network

  server:
    build:
      context: ./server_app/.
      dockerfile: Dockerfile
    container_name: messenger_api
    environment:
      DATABASE_URL: postgresql://cluster_user:password@db:5432/clusterdb
      API_HOST: 0.0.0.0
      API_PORT: 8000
      DEBUG: "True"
      LOG_LEVEL: "INFO"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./server_app:/app
    networks:
      - messenger_network
    command: bash -c "sleep 5 && python -m uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend/.
      dockerfile: Dockerfile
    container_name: messenger_frontend
    ports:
      - "8080:80"
    depends_on:
      - server
    networks:
      - messenger_network

volumes:
  postgres_data:

networks:
  messenger_network:
    driver: bridge

